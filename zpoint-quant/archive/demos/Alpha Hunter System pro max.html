<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AlphaSniper Pro - 导入导出增强版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
    /* --- 核心变量 --- */
    :root {
        --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0; --text: #0f172a; --text-mute: #64748b;
        --up: #059669; --down: #dc2626; --accent: #0f172a; --highlight: #f1f5f9;
        /* RS 颜色 */
        --rs-leader: #059669; --rs-strong: #86efac; --rs-follow: #fbbf24; --rs-weak: #e2e8f0;
    }
    [data-theme="dark"] {
        --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f1f5f9; --text-mute: #94a3b8;
        --accent: #3b82f6; --highlight: #27354f; --rs-weak: #334155;
    }

    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* --- 布局 --- */
    header { background: var(--panel); padding: 0 20px; height: 50px; display: flex; align-items: center; border-bottom: 1px solid var(--border); justify-content: space-between; }
    h1 { font-size: 16px; font-weight: 700; margin: 0; }
    
    .dashboard-stats { display: flex; gap: 15px; font-size: 12px; font-weight: 600; color: var(--text-mute); }
    .stat-val { color: var(--text); margin-left: 4px; }
    
    .main-container { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    
    .controls { padding: 15px; border-bottom: 1px solid var(--border); }
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 12px; resize: vertical; box-sizing: border-box; }
    
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }
    button { flex: 1; background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button:hover { opacity: 0.9; }
    button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text-mute); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- 标签页 --- */
    .list-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); }
    .list-tab { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: 600; color: var(--text-mute); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
    .list-tab:hover { background: var(--bg); }
    .list-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge { display: inline-block; background: #ef4444; color: white; border-radius: 10px; padding: 0 5px; font-size: 10px; margin-left: 4px; opacity: 0; transition: 0.2s; }
    .tab-badge.show { opacity: 1; }

    /* --- 列表区域 --- */
    .list-header { display: grid; grid-template-columns: 30px 1fr 60px 60px 60px; padding: 8px 15px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-mute); align-items: center; }
    .scan-results { flex: 1; overflow-y: auto; background: var(--panel); }
    
    .list-row { display: grid; grid-template-columns: 30px 1fr 60px 60px 60px; padding: 10px 15px; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; cursor: pointer; transition: 0.1s; }
    .list-row:hover { background: var(--highlight); }
    .list-row.active { background: var(--highlight); border-left: 3px solid var(--accent); }

    .col-symbol { font-weight: 700; color: var(--text); display: flex; flex-direction: column; line-height: 1.2; }
    .col-symbol small { font-weight: normal; font-size: 10px; color: var(--text-mute); }
    
    /* RS 胶囊 */
    .rs-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 700; text-align: center; width: 100%; box-sizing: border-box; }
    .rs-leader { background: var(--rs-leader); color: white; }
    .rs-strong { background: var(--rs-strong); color: #065f46; }
    .rs-follow { background: var(--rs-follow); color: #b45309; }
    .rs-weak { background: var(--rs-weak); color: #64748b; }
    
    .change-up { color: var(--up); font-weight: 600; }
    .change-down { color: var(--down); font-weight: 600; }
    
    /* 信号点 */
    .dot-signal { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.3); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 70% { box-shadow: 0 0 0 4px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }

    /* --- 图表区 --- */
    .workspace { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; background: var(--bg); }
    .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; flex: 1; min-height: 300px; display: flex; flex-direction: column; }
    .chart-box { flex: 1; position: relative; width: 100%; }

    /* 重试提示 */
    #retryBox { font-size: 12px; color: var(--text-mute); display: none; border-left: 2px solid #eab308; padding-left: 8px; }

    /* 文件输入隐藏 */
    #fileImport { display: none; }
</style>
</head>
<body>

<header>
    <h1>🏆 AlphaSniper <span style="font-weight:normal; opacity:0.6; font-size:12px; margin-left:5px;">导入导出增强版</span></h1>
    <div class="dashboard-stats">
        <div>进度: <span id="statProgress" class="stat-val">0/0</span></div>
        <div>成功: <span id="statSuccess" class="stat-val" style="color:var(--up)">0</span></div>
        <div id="retryBox">⚠️ 自动重试中... <span id="statRetry">0</span></div>
    </div>
    <button class="ghost" style="width:auto; padding:5px 10px;" onclick="toggleTheme()">🌗</button>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="controls">
            <label style="font-size:12px; font-weight:600; color:var(--text-mute)">股票池</label>
            <textarea id="symbolInput" rows="4" placeholder="每行一个代码，例如：AAPL&#10;0700.HK"></textarea>
            
            <div class="btn-group">
                <input type="file" id="fileImport" accept=".txt,.csv">
                <!-- 替换原示例按钮为导入功能 -->
                <button class="ghost" onclick="document.getElementById('fileImport').click()">📂 导入股票池</button>
                <!-- 新增导出按钮 -->
                <button class="ghost" onclick="exportData()">💾 导出CSV</button>
            </div>
            
            <div class="btn-group">
                <button onclick="startSystem()">🚀 全量扫描</button>
                <button class="ghost" id="btnStop" disabled onclick="stopScan()">停止</button>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="list-tabs">
            <div class="list-tab active" onclick="switchTab('all')" id="tabAll">全部结果</div>
            <div class="list-tab" onclick="switchTab('sniper')" id="tabSniper">
                ★ 狙击池 <span class="tab-badge" id="sniperCount">0</span>
            </div>
            <div class="list-tab" onclick="switchTab('failed')" id="tabFailed" style="color:#ef4444">失败项</div>
        </div>

        <div class="list-header">
            <div>#</div>
            <div>代码</div>
            <div style="text-align:right">价格</div>
            <div style="text-align:center">RS强度</div>
            <div style="text-align:right">涨幅</div>
        </div>
        <div id="scanResults" class="scan-results">
            <div style="padding:40px 20px; text-align:center; color:var(--text-mute); font-size:12px;">
                请点击“📂 导入股票池”或手动输入<br>然后点击“🚀 全量扫描”
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="chart-card" style="flex:1.5">
            <div class="chart-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <div id="mainTitle" style="font-weight:700; font-size:14px;">主图 (Price & RS Line)</div>
                <div id="benchInfo" style="font-size:12px; color:var(--text-mute)">--</div>
            </div>
            <div class="chart-box">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        <div class="chart-card" style="flex:1">
            <div style="font-weight:700; margin-bottom:10px; font-size:14px;">机构猎手资金 (Traffic Light)</div>
            <div class="chart-box">
                <canvas id="subChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
/* 
    ================================================================
    0. 文件导入导出功能 (New Features)
    ================================================================
*/
// 导入逻辑
document.getElementById('fileImport').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        // 读取内容并去重
        const text = e.target.result;
        document.getElementById('symbolInput').value = text;
        alert(`已成功导入股票池 (文件大小: ${(file.size/1024).toFixed(1)} KB)`);
    };
    reader.readAsText(file);
    // 清空input以便下次可以选同一个文件
    e.target.value = ''; 
});

// 导出逻辑
function exportData() {
    if (!app.results || app.results.length === 0) {
        alert("暂无扫描结果可导出");
        return;
    }
    
    // 生成 CSV 内容
    // 添加 BOM (\uFEFF) 以解决 Excel 打开中文乱码问题
    let csvContent = "\uFEFF排名,代码,基准,当前价格,RS强度,期间涨幅,狙击信号\n";
    
    // 默认导出按 RS 排序的全部结果
    const list = [...app.results].sort((a,b) => b.rsInfo.rsStrength - a.rsInfo.rsStrength);
    
    list.forEach((item, index) => {
        const signalText = item.hasSignal ? "★买入" : "";
        const row = [
            index + 1,
            item.symbol,
            item.bSym,
            item.rsInfo.price.toFixed(2),
            item.rsInfo.rsStrength.toFixed(2),
            item.rsInfo.changePct.toFixed(2) + "%",
            signalText
        ];
        csvContent += row.join(",") + "\n";
    });

    // 创建下载链接
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `AlphaSniper_Export_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}


/* 
    ================================================================
    1. 网络层 (双代理轮询 + 自动重试)
    ================================================================
*/
const YAHOO_BASE = "https://query1.finance.yahoo.com/v8/finance/chart/";
const PROXY_LIST = [
    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchHistory(symbol) {
    const targetUrl = `${YAHOO_BASE}${symbol}?range=2y&interval=1d&events=history`;
    for (let i = 0; i < PROXY_LIST.length; i++) {
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 8000); 
            const res = await fetch(PROXY_LIST[i](targetUrl), { signal: controller.signal });
            clearTimeout(id);

            if (!res.ok) throw new Error();
            const json = await res.json();
            if (!json.chart?.result?.[0]) throw new Error();
            
            const r = json.chart.result[0];
            const q = r.indicators.quote[0];
            const dates=[], close=[], high=[], low=[], open=[];
            
            (r.timestamp || []).forEach((t, idx) => {
                if (q.close[idx] != null && q.high[idx] != null) {
                    dates.push(new Date(t * 1000).toISOString().split('T')[0]);
                    close.push(q.close[idx]); high.push(q.high[idx]); low.push(q.low[idx]); open.push(q.open[idx]);
                }
            });
            if (close.length < 20) throw new Error("Data too short");
            return { dates, close, high, low, open, symbol };
        } catch (e) {
            if (i === PROXY_LIST.length - 1) throw e;
        }
    }
}
async function sleep(ms) { return new Promise(r=>setTimeout(r, ms)); }

/* 
    ================================================================
    2. 核心算法 (RS Standard + Sniper V20)
    ================================================================
*/
const ALGO = {
    SMA: (arr,n,m) => { let out=[],y=arr[0];out.push(y);for(let i=1;i<arr.length;i++){y=(arr[i]*m+y*(n-m))/n;out.push(y);}return out;},
    EMA: (arr,n) => { let k=2/(n+1),out=[],y=arr[0];out.push(y);for(let i=1;i<arr.length;i++){y=arr[i]*k+y*(1-k);out.push(y);}return out;},
    HHV: (arr,n) => arr.map((_,i)=>Math.max(...arr.slice(Math.max(0,i-n+1),i+1))),
    LLV: (arr,n) => arr.map((_,i)=>Math.min(...arr.slice(Math.max(0,i-n+1),i+1))),
    REF: (arr,n) => { let out=new Array(n).fill(0);for(let i=0;i<arr.length-n;i++)out.push(arr[i]);return out;}
};

function calculateRS_Standard(stock, benchMap) {
    const period = 250, len = stock.close.length;
    const idxNow = len - 1, idxStart = Math.max(0, len - 1 - period);
    const sRet = stock.close[idxNow] / stock.close[idxStart];
    
    const dNow = stock.dates[idxNow], dStart = stock.dates[idxStart];
    const bNow = benchMap[dNow], bStart = benchMap[dStart];
    let rsValue = 100;
    
    if (bNow && bStart) rsValue = (sRet / (bNow / bStart)) * 100;
    return { rsStrength: rsValue, changePct: (sRet - 1) * 100, price: stock.close[idxNow] };
}

function calculateSniper(data) {
    const { high, low, close } = data;
    const len = close.length, HH_LEN = 250;
    
    const varH = ALGO.EMA(ALGO.HHV(high, HH_LEN), 21);
    const lc = ALGO.REF(close, 1);
    const smaAbs = ALGO.SMA(low.map((l,i)=>Math.abs(l-lc[i])), 5, 1);
    const smaMax = ALGO.SMA(low.map((l,i)=>Math.max(l-lc[i],0)), 5, 1);
    const varReact = smaAbs.map((v,i)=>smaMax[i]===0?0:(v/smaMax[i])*100);
    const fundFlow = ALGO.EMA(close.map((c,i)=>(c*1.3<varH[i])?varReact[i]*10:varReact[i]/10),3);
    
    const llv30 = ALGO.LLV(low, 30), hhv30 = ALGO.HHV(fundFlow, 30);
    const rawMoney = ALGO.EMA(low.map((l,i)=>(l<=llv30[i])?(fundFlow[i]+hhv30[i]*2)/2:0),3).map(v=>v/10);
    const mainMoney = ALGO.EMA(rawMoney, 3);
    const refMoney = ALGO.REF(mainMoney, 1);
    
    const accel = mainMoney.map((v,i)=>v>refMoney[i]); 
    const decel = mainMoney.map((v,i)=>v<=refMoney[i]);
    const refAccel = ALGO.REF(accel, 1);
    
    // 超卖
    const llv9 = ALGO.LLV(low,9), hhv9 = ALGO.HHV(high,9);
    const rsv = close.map((c,i)=>(c-llv9[i])/(hhv9[i]-llv9[i])*100);
    const K = ALGO.SMA(rsv,3,1), D=ALGO.SMA(K,3,1), J=K.map((k,i)=>3*k-2*D[i]);
    
    let lights = new Array(len).fill(0), signals = new Array(len).fill(0);
    for(let i=20; i<len; i++) {
        // 买点条件
        if(refAccel[i] && decel[i] && (J[i]<20 || mainMoney[i]>0.5)) signals[i] = 1;
        if(signals[i]) lights[i]=3; else if(accel[i]) lights[i]=1; else lights[i]=2;
    }
    return { mainMoney, lights, signals };
}

/* 
    ================================================================
    3. 系统控制器 (State & Task)
    ================================================================
*/
let app = { 
    running: false, 
    tasks: {}, 
    results: [], 
    benchmarks: {}, 
    activeTab: 'all', 
    maxRetries: 8 
};

function getBenchSym(sym) {
    if(sym.includes('.SS')||sym.includes('.SZ')) return "000001.SS";
    if(sym.includes('.HK')) return "^HSI";
    return "SPY";
}

async function startSystem() {
    if(app.running) return;
    app.running = true;
    app.results = []; app.tasks = {};
    document.getElementById('btnStop').disabled = false;
    document.getElementById('scanResults').innerHTML = '<div style="padding:20px;text-align:center">正在初始化...</div>';

    // 1. 基准
    let needed = ['SPY', '^HSI', '000001.SS'];
    try {
        for (let b of needed) {
            if(!app.benchmarks[b]) {
                const d = await fetchHistory(b);
                const m = {}; d.dates.forEach((t,i)=>m[t]=d.close[i]);
                app.benchmarks[b] = { ...d, map: m };
            }
        }
    } catch(e) { 
        alert("网络连接失败"); app.running=false; return; 
    }

    // 2. 任务队列
    const syms = [...new Set(document.getElementById('symbolInput').value.split(/[\n, ]+/).map(s=>s.trim().toUpperCase()).filter(s=>s))];
    if(syms.length === 0) { alert("股票池为空"); app.running = false; return; }

    syms.forEach(s => app.tasks[s] = { status: 'pending', retries: 0 });

    while(app.running) {
        const pending = Object.keys(app.tasks).filter(k => app.tasks[k].status === 'pending');
        if(pending.length === 0) break;
        
        document.getElementById('retryBox').style.display = 'block';
        document.getElementById('statRetry').innerText = pending.length;
        updateProgress(syms.length);

        for(let sym of pending) {
            if(!app.running) break;
            const task = app.tasks[sym];
            
            if(task.retries > app.maxRetries) { task.status='failed'; continue; }
            
            try {
                await sleep(Math.random()*300+100);
                const data = await fetchHistory(sym);
                processStock(sym, data);
                task.status = 'success';
            } catch(e) {
                task.retries++;
            }
            render();
            updateProgress(syms.length);
        }
    }
    app.running = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('retryBox').style.display = 'none';
}

function processStock(sym, data) {
    const bSym = getBenchSym(sym);
    const bMap = app.benchmarks[bSym]?.map;
    if(!bMap) return;
    
    const sniper = calculateSniper(data);
    const rsInfo = calculateRS_Standard(data, bMap);
    
    const rsLine = [];
    data.dates.forEach((d,i)=>{
        let b = bMap[d]; rsLine.push(b ? data.close[i]/b : (rsLine[rsLine.length-1]||0));
    });

    app.results.push({
        symbol: sym, data, sniper, rsInfo, rsLine, bSym,
        hasSignal: sniper.signals[sniper.signals.length-1] === 1
    });
}

/* 
    ================================================================
    4. 界面渲染
    ================================================================
*/
function render() {
    // 过滤
    let list = app.results;
    if(app.activeTab === 'sniper') list = list.filter(r => r.hasSignal);
    if(app.activeTab === 'failed') {
        const failedKeys = Object.keys(app.tasks).filter(k => app.tasks[k].status === 'failed');
        renderFailed(failedKeys);
        return;
    }
    
    // 排序
    list.sort((a,b) => b.rsInfo.rsStrength - a.rsInfo.rsStrength);
    
    // 计数
    const sniperCount = app.results.filter(r => r.hasSignal).length;
    const badge = document.getElementById('sniperCount');
    badge.innerText = sniperCount;
    badge.classList.toggle('show', sniperCount > 0);

    const container = document.getElementById('scanResults');
    let html = '';
    
    list.forEach((item, i) => {
        const { rsStrength, changePct, price } = item.rsInfo;
        
        let rsCls = 'rs-weak';
        if(rsStrength > 115) rsCls = 'rs-leader';
        else if(rsStrength >= 100) rsCls = 'rs-strong';
        else if(rsStrength >= 85) rsCls = 'rs-follow';
        
        const chgCls = changePct >= 0 ? 'change-up' : 'change-down';
        const signalHtml = item.hasSignal ? '<span class="dot-signal"></span>' : '';
        
        html += `
        <div class="list-row" onclick="drawChart('${item.symbol}')">
            <div style="color:#aaa; font-size:11px">${i+1}</div>
            <div class="col-symbol">
                <span>${signalHtml}${item.symbol}</span>
                <small>vs ${item.bSym}</small>
            </div>
            <div style="text-align:right">${price.toFixed(2)}</div>
            <div style="text-align:center"><span class="rs-badge ${rsCls}">${rsStrength.toFixed(0)}</span></div>
            <div style="text-align:right" class="${chgCls}">${changePct>0?'+':''}${changePct.toFixed(1)}%</div>
        </div>`;
    });
    
    if(html === '') html = '<div style="padding:20px;text-align:center;color:#aaa">此列表无数据</div>';
    container.innerHTML = html;
}

function renderFailed(keys) {
    const container = document.getElementById('scanResults');
    let html = keys.map(k => `
        <div class="list-row" style="opacity:0.6; cursor:not-allowed">
            <div>x</div>
            <div class="col-symbol" style="color:#ef4444">${k}</div>
            <div style="text-align:right; font-size:12px; grid-column:3/-1">网络超时/代码错误 (×10)</div>
        </div>
    `).join('');
    container.innerHTML = html || '<div style="padding:20px;text-align:center;color:#aaa">无失败项</div>';
}

function switchTab(tab) {
    app.activeTab = tab;
    document.querySelectorAll('.list-tab').forEach(el => el.classList.remove('active'));
    document.getElementById(tab==='all'?'tabAll':(tab==='sniper'?'tabSniper':'tabFailed')).classList.add('active');
    render();
}

let mainChart, subChart;
function drawChart(sym) {
    const item = app.results.find(r => r.symbol === sym);
    if(!item) return;
    
    const limit = 250, len = item.data.close.length;
    const s = Math.max(0, len-limit);
    
    if(mainChart) mainChart.destroy();
    mainChart = new Chart(document.getElementById('mainChart'), {
        type: 'line',
        data: {
            labels: item.data.dates.slice(s),
            datasets: [
                { label: 'Price', data: item.data.close.slice(s), borderColor: '#334155', borderWidth: 2, yAxisID: 'y', pointRadius: 0 },
                { label: 'RS Line', data: item.rsLine.slice(s), borderColor: '#059669', borderWidth: 2, borderDash: [4,4], yAxisID: 'y1', pointRadius: 0 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { display: false },
                y: { display: true, position: 'left', grid: { display: false } },
                y1: { display: true, position: 'right', grid: { display: false } }
            }
        }
    });
    document.getElementById('mainTitle').innerText = `${item.symbol}`;
    document.getElementById('benchInfo').innerText = `RS: ${item.rsInfo.rsStrength.toFixed(1)} (vs ${item.bSym})`;

    if(subChart) subChart.destroy();
    const lights = item.sniper.lights.slice(s);
    const funds = item.sniper.mainMoney.slice(s);
    const colors = lights.map(l => l===3?'#22c55e':l===1?'#ef4444':'#facc15');
    
    subChart = new Chart(document.getElementById('subChart'), {
        type: 'bar',
        data: { labels: item.data.dates.slice(s), datasets: [{ data: funds, backgroundColor: colors }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x:{display:false}, y:{display:false} }, plugins:{legend:{display:false}} }
    });
    
    document.querySelectorAll('.list-row').forEach(r => r.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function updateProgress(total) {
    const done = app.results.length;
    document.getElementById('statProgress').innerText = `${done}/${total}`;
    document.getElementById('statSuccess').innerText = done;
}

function stopScan() { app.running = false; }
function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='light'?'dark':'light'); }

</script>
</body>
</html>
