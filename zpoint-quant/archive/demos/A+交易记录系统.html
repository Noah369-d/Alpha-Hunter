<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+ 交易系统 (专业版 v2.7 - UI优化版)</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F7F6F3;
            --card-bg: #FFFFFF;
            --text-primary: #37352F;
            --text-secondary: #787774;
            --border-color: #E9E9E7;
            --accent-blue: #2383E2;
            --accent-green: #0F7B6C;
            --accent-red: #EB5757;
            --hover-bg: #F0F0F0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px; /* 整体保留少量边距 */
            line-height: 1.5;
        }

        /* --- 修改1: 全局布局左移，减少左侧留白 --- */
        .layout {
            display: grid;
            grid-template-columns: 340px 1fr; /* 左侧固定，右侧自适应 */
            gap: 25px; /* 左右板块间距 */
            width: 98%; /* 占据屏幕绝大部分宽度 */
            max-width: 1800px; /*在大屏上不过于拉伸，但比之前宽得多 */
            margin: 0; /* 【关键】移除居中，强制靠左 */
            align-items: start;
        }

        /* 移动端适配：小于 1000px 变为单列 */
        @media(max-width: 1000px) { 
            .layout { grid-template-columns: 1fr; width: 100%; } 
        }

        h1, h2, h3, h4 { margin-top: 0; font-weight: 600; color: #333; margin-bottom: 15px; }
        
        /* Cards */
        .card {
            background: var(--card-bg);
            padding: 25px; /* 增加内部呼吸感 */
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            margin-bottom: 25px; /* --- 修改1: 增加板块上下间距 --- */
        }

        /* Inputs */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 4px; background: #FAFAFA; font-size: 0.95rem; box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { background: #fff; border-color: var(--accent-blue); outline: none; box-shadow: 0 0 0 2px rgba(35,131,226,0.1); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-with-btn { display: flex; gap: 8px; }

        /* Buttons */
        .mini-btn {
            padding: 0 14px; background: #E3E2E0; border: 1px solid #ccc;
            border-radius: 4px; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .mini-btn:hover { background: #d0d0d0; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.2s;
        }
        .btn-primary { background-color: var(--accent-blue); color: white; }
        .btn-primary:hover { background-color: #1a6fb3; }
        .btn-secondary { background-color: white; border: 1px solid #ddd; color: #333; }
        .btn-secondary:hover { background-color: #f5f5f5; }
        
        .btn-journal { background-color: #333; color: white; width: 100%; margin-top: 20px; padding: 12px; }
        .btn-small { padding: 6px 12px; font-size: 0.85rem; width: auto; flex: none; border-radius: 4px; }
        .btn-stat { background-color: #6c5ce7; color: white; border:none; }
        .btn-stat:hover { background-color: #5b4cc4; }

        /* --- 修改1: 表格布局优化 --- */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        .step-table, .journal-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9rem; min-width: 800px; }
        
        .step-table th, .journal-table th { 
            text-align: left; background: #FAFAFA; padding: 12px 15px; color: #555; 
            border-bottom: 2px solid #eee; font-weight: 600; 
        }
        .step-table td, .journal-table td { 
            padding: 12px 15px; border-bottom: 1px solid #eee; vertical-align: middle; 
            color: #333;
        }
        /* 隔行变色 */
        .journal-table tr:hover td { background-color: #FBFBFB; }

        /* Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; cursor: pointer; display: inline-block; white-space: nowrap; }
        .badge-gray { background: #eee; color: #555; }
        .badge-green { background: #DBEDDB; color: #1C3829; }
        .badge-blue { background: #D3E5EF; color: #183347; }
        .badge-red { background: #FFE2DD; color: #5D1715; }

        /* Charts */
        .charts-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px;
        }
        .chart-box { background: #F8F9FA; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; }

        /* Modals */
        .checklist-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        
        /* --- 修改2: 评分系统对齐优化 --- */
        .checklist-box {
            background: white; padding: 25px; border-radius: 8px;
            width: 350px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }
        .check-item {
            display: flex;
            align-items: center; /* 垂直居中 */
            padding: 10px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
            margin-bottom: 2px;
        }
        .check-item:hover { background: var(--hover-bg); }
        .check-item input[type="checkbox"] {
            width: 18px; 
            height: 18px; 
            margin: 0 12px 0 0; /* 右侧留白 */
            cursor: pointer;
            flex-shrink: 0; /* 防止被压缩 */
            accent-color: var(--accent-blue); /* 现代浏览器自定义颜色 */
        }
        .check-item span {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.4;
            padding-top: 2px; /* 微调文字垂直位置 */
        }

        .checklist-box.wide { width: 650px; }

        /* Monitor Panel */
        .monitor-panel { background: #F8F9FA; border: 1px solid #E9ECEF; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .monitor-info { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.9rem; }
        .monitor-alert { margin-top: 15px; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 0.95rem; display: none; text-align: center; }
        .alert-add { background: #D3E5EF; color: #183347; border: 1px solid #B8DAFF; }
        .alert-stop { background: #FFE2DD; color: #842029; border: 1px solid #F5C6CB; }
        .alert-win { background: #D1E7DD; color: #0F5132; border: 1px solid #BADBCC; }

        .log-history { background: #F5F5F5; border: 1px solid #eee; height: 200px; overflow-y: auto; margin-bottom: 15px; padding: 15px; border-radius: 6px; }
        .log-entry { background: white; padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent-blue); font-size: 0.9rem; border-radius: 0 4px 4px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #333; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        .text-red { color: var(--accent-red); font-weight: bold; }
        .text-green { color: var(--accent-green); font-weight: bold; }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h2>🛠️ 交易配置</h2>
            <div class="form-group">
                <label>🏷️ 标的名称 (Ticker)</label>
                <input type="text" id="stockName" placeholder="如 TSLA, 0700.HK, BTC-USD">
                <div style="font-size:0.75rem; color:#999; margin-top:4px;">*用于自动追踪，请填 Yahoo 代码</div>
            </div>
            
            <div class="form-group">
                <label>📅 计划日期</label>
                <input type="date" id="entryDate">
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

            <div class="form-group" style="background: #f0f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d9e2ec;">
                <label style="color:#243b53;">📊 关联大盘 (Market)</label>
                <select id="marketSymbol" style="background:white;">
                    <option value="^IXIC">🇺🇸 纳斯达克 (^IXIC)</option>
                    <option value="^GSPC">🇺🇸 标普500 (^GSPC)</option>
                    <option value="^HSI">🇭🇰 恒生指数 (^HSI)</option>
                    <option value="000001.SS">🇨🇳 上证指数 (000001.SS)</option>
                </select>
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

            <div class="form-group">
                <label>📉 入场价 (Entry)</label>
                <input type="number" id="entryPrice" placeholder="0.00" step="0.01">
            </div>
            <div class="input-grid">
                <div class="form-group">
                    <label>🛑 止损价</label>
                    <input type="number" id="stopLossPrice" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>⚖️ 盈亏比</label>
                    <div class="input-with-btn">
                        <input type="number" id="rrRatio" value="2" step="0.1">
                        <button class="mini-btn" onclick="autoCalcTarget()">⚡</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>🎯 止盈价</label>
                <input type="number" id="targetPrice" placeholder="自动/手动" step="0.01">
            </div>
            
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            
            <div class="input-grid">
                <div class="form-group"><label>💵 总资金</label><input type="number" id="capital" value="100000"></div>
                <div class="form-group"><label>📦 每手股数</label><input type="number" id="lotSize" value="1"></div>
            </div>
            <div class="form-group"><label>🖐️ 初始手数 (可选反推)</label><input type="number" id="initialLots"></div>
            
            <div class="form-group">
                <label>📊 仓位策略</label>
                <select id="strategyType">
                    <option value="livermore">利弗莫尔 (20% -> 20-20-40)</option>
                    <option value="domestic">国内大户 (40% -> 20-20-20)</option>
                </select>
            </div>
            <div class="form-group"><label>🎲 胜率 (%)</label><input type="number" id="winRate" value="50"></div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="calculate()">开始测算</button>
                <button class="btn btn-secondary" onclick="clearInputs()">重置</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- 2025 Stats -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                <h3 style="margin:0;">📊 2025 全球大盘情绪 (Yahoo)</h3>
                <button class="btn btn-stat btn-small" id="updateStatsBtn" onclick="update2025Stats()">🔄 更新数据</button>
            </div>
            <div class="charts-container" id="chartsArea">
                <div class="chart-box"><div class="chart-title" style="margin-bottom:10px; font-weight:bold;">纳斯达克</div><canvas id="chartNasdaq"></canvas></div>
                <div class="chart-box"><div class="chart-title" style="margin-bottom:10px; font-weight:bold;">标普500</div><canvas id="chartSP500"></canvas></div>
                <div class="chart-box"><div class="chart-title" style="margin-bottom:10px; font-weight:bold;">恒生指数</div><canvas id="chartHSI"></canvas></div>
                <div class="chart-box"><div class="chart-title" style="margin-bottom:10px; font-weight:bold;">上证指数</div><canvas id="chartSH"></canvas></div>
            </div>
        </div>

        <!-- Result Card -->
        <div class="card hidden" id="resultCard">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0;">📊 策略报告</h2>
                <span class="badge badge-blue" style="font-size:1.1rem; padding:6px 12px;" id="resStockName">--</span>
            </div>
            <p style="color:#777; font-size:1rem; margin: 10px 0 20px 0;">策略: <span id="resStrategyName">--</span> | 盈亏比: <strong id="resRR" style="color:#333">--</strong></p>
            
            <h4 style="margin-bottom:10px;">🏗️ 分批建仓计划</h4>
            <div class="table-wrapper">
                <table class="step-table">
                    <thead><tr><th>阶段</th><th>触发价</th><th>手数</th><th>成本</th><th>均价</th></tr></thead>
                    <tbody id="stepTableBody"></tbody>
                </table>
            </div>
            <button class="btn btn-journal" onclick="addToJournal()">📝 符合条件，记入日志</button>
        </div>

        <!-- Journal Table -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>📔 交易日志</h2>
                <button class="btn btn-secondary btn-small" onclick="exportData()">导出 JSON</button>
            </div>
            <div class="table-wrapper">
                <table class="journal-table">
                    <thead>
                        <tr>
                            <th width="120">日期</th>
                            <th width="80">大盘</th>
                            <th width="100">标的</th>
                            <th width="80">状态</th>
                            <th>策略详情</th>
                            <th>盈亏点位</th>
                            <th width="80">评分</th>
                            <th width="100">监控</th>
                            <th width="40"></th>
                        </tr>
                    </thead>
                    <tbody id="journalBody"></tbody>
                </table>
            </div>
            <div id="emptyMsg" style="text-align:center; padding:40px; color:#ccc; font-size:1rem;">暂无交易记录</div>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="checklist-overlay" id="checklistModal">
    <div class="checklist-box">
        <h3 style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">✅ A+ 评分清单</h3>
        <!-- 容器用于生成复选框 -->
        <div id="checklistItems" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        <div style="margin-top:20px; text-align:right; border-top:1px solid #eee; padding-top:15px;">
            <button class="btn btn-secondary btn-small" style="margin-right:10px;" onclick="document.getElementById('checklistModal').style.display='none'">取消</button>
            <button class="btn btn-primary btn-small" onclick="saveChecklist()">保存评分</button>
        </div>
    </div>
</div>

<div class="checklist-overlay" id="strategyModal">
    <div class="checklist-box wide">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
            <h3 style="margin:0;">📊 策略计划详情</h3>
            <button class="btn btn-secondary btn-small" onclick="document.getElementById('strategyModal').style.display='none'">关闭</button>
        </div>
        <div id="strategyContent" style="margin-top:10px; overflow-x:auto;"></div>
    </div>
</div>

<div class="checklist-overlay" id="dailyLogModal">
    <div class="checklist-box wide">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
            <h3 style="margin:0;">📅 复盘 & 监控</h3>
            <span id="logStockTitle" class="badge badge-blue" style="font-size:0.9rem;"></span>
        </div>
        
        <!-- 价格监控面板 -->
        <div class="monitor-panel">
            <div class="monitor-info">
                <span>🛑 止损: <strong id="monitorStop" class="text-red" style="font-size:1rem;">--</strong></span>
                <span>🎯 止盈: <strong id="monitorTarget" class="text-green" style="font-size:1rem;">--</strong></span>
            </div>
            
            <div style="display:flex; gap:10px; align-items:center;">
                <label style="white-space:nowrap; font-weight:bold;">当前市价:</label>
                <!-- 价格输入框 -->
                <input type="number" id="checkPriceInput" placeholder="输入或自动追踪..." oninput="checkPriceAlert(this.value)" style="font-weight:bold; font-size:1rem; padding:8px;">
                
                <!-- 自动追踪按钮 -->
                <button class="btn btn-stat btn-small" id="btnAutoTrack" onclick="autoTrackPrice()" style="height:38px; padding:0 15px;">
                    <span id="trackIcon">🔄</span> 追踪
                </button>
                
                <button class="btn btn-secondary btn-small" onclick="savePriceToLog()" style="height:38px;">存日志</button>
            </div>
            <div style="font-size:0.75rem; color:#999; margin-top:5px; text-align:right;">*自动追踪需正确代码 (如 TSLA)</div>

            <div id="priceAlertBox" class="monitor-alert"></div>
        </div>

        <div id="logHistory" class="log-history"></div>
        
        <textarea id="newLogInput" placeholder="输入复盘内容..." rows="3" style="margin-bottom:15px;"></textarea>
        <div style="text-align:right;">
            <button class="btn btn-secondary btn-small" style="margin-right:10px;" onclick="document.getElementById('dailyLogModal').style.display='none'">关闭</button>
            <button class="btn btn-primary btn-small" onclick="addLogEntry()">提交记录</button>
        </div>
    </div>
</div>

<script>
    const STANDARD_CHECKLIST = ["顺势交易 (Trend)", "关键支撑/阻力 (Level)", "成交量配合 (Volume)", "盈亏比 > 1:2 (R/R)", "大盘环境安全 (Market)", "情绪平稳 (Mindset)", "纵向共振 (Vertical)", "横向共振 (Horizontal)", "十字星共振 (Doji)"];
    let journalData = JSON.parse(localStorage.getItem('aplus_journal_v27')) || [];
    let currentCalcData = null;
    let editingEntryId = null; 
    let chartInstances = {}; 

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        // 简单迁移
        journalData.forEach(item => {
            if (!item.dailyLogs) item.dailyLogs = [];
            if (!item.marketIndex) item.marketIndex = '000001.SS';
        });
        renderJournal();
    });

    // --- 自动获取个股现价逻辑 ---
    async function autoTrackPrice() {
        const item = journalData.find(i => i.id === editingEntryId);
        if(!item || !item.stock) { alert("未找到标的代码"); return; }

        const btn = document.getElementById('btnAutoTrack');
        const icon = document.getElementById('trackIcon');
        const input = document.getElementById('checkPriceInput');
        
        btn.disabled = true;
        icon.className = 'spinner';
        icon.innerText = ''; 
        input.placeholder = "获取中...";

        const symbol = item.stock.trim().toUpperCase();
        const proxy = "https://corsproxy.io/?";
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;

        try {
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            
            if (data.chart && data.chart.result && data.chart.result[0].meta) {
                const price = data.chart.result[0].meta.regularMarketPrice;
                input.value = price;
                checkPriceAlert(price);
                input.style.backgroundColor = "#e6fffa";
                setTimeout(() => input.style.backgroundColor = "#FAFAFA", 1000);
            } else { throw new Error("无数据"); }
        } catch (e) {
            console.error(e);
            alert(`获取失败: ${symbol}\n请确保填写的"标的名称"是Yahoo财经代码`);
            input.placeholder = "失败";
        } finally {
            btn.disabled = false;
            icon.className = '';
            icon.innerText = '🔄';
        }
    }

    // --- 2025 大盘统计 ---
    async function update2025Stats() {
        const btn = document.getElementById('updateStatsBtn');
        btn.disabled = true; btn.innerText = "⏳...";
        const start2025 = Math.floor(new Date('2025-01-01').getTime() / 1000);
        const symbols = [{ code: '^IXIC', id: 'chartNasdaq' }, { code: '^GSPC', id: 'chartSP500' }, { code: '^HSI', id: 'chartHSI' }, { code: '000001.SS', id: 'chartSH' }];
        const proxyUrl = "https://corsproxy.io/?";
        try {
            for (let sym of symbols) {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym.code}?period1=${start2025}&period2=${Math.floor(Date.now()/1000)}&interval=1d`;
                const res = await fetch(proxyUrl + encodeURIComponent(url));
                const json = await res.json();
                if(!json.chart || !json.chart.result) continue;
                const quotes = json.chart.result[0].indicators.quote[0].close;
                const prevClose = json.chart.result[0].meta.chartPreviousClose;
                let up=0, down=0, prev=prevClose;
                quotes.forEach(c => { if(c!==null && prev!==null){ if(c>prev) up++; else if(c<prev) down++; } if(c!==null) prev=c; });
                renderPieChart(sym.id, up, down);
            }
            btn.innerText = "✅ 完成";
        } catch (e) { btn.innerText = "❌ 重试"; } finally { btn.disabled = false; }
    }

    function renderPieChart(canvasId, up, down) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
        chartInstances[canvasId] = new Chart(ctx, {
            type: 'pie',
            data: { labels: [`涨${up}`, `跌${down}`], datasets: [{ data: [up, down], backgroundColor: ['#0F7B6C', '#EB5757'], borderWidth: 0 }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } } }
        });
    }

    // --- 核心计算 ---
    function autoCalcTarget() {
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const stop = parseFloat(document.getElementById('stopLossPrice').value);
        const rr = parseFloat(document.getElementById('rrRatio').value);
        if(entry && stop && rr) {
            const diff = Math.abs(entry - stop);
            document.getElementById('targetPrice').value = (entry > stop ? entry + diff * rr : entry - diff * rr).toFixed(2);
        }
    }

    function calculate() {
        const stock = document.getElementById('stockName').value || '未命名';
        const date = document.getElementById('entryDate').value;
        const market = document.getElementById('marketSymbol').value;
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const stop = parseFloat(document.getElementById('stopLossPrice').value);
        const target = parseFloat(document.getElementById('targetPrice').value);
        let capital = parseFloat(document.getElementById('capital').value);
        const lotSize = parseFloat(document.getElementById('lotSize').value) || 1;
        const strategy = document.getElementById('strategyType').value;
        const initLots = parseFloat(document.getElementById('initialLots').value);

        if(!entry || !stop || !target) { alert("请补全价格信息"); return; }

        let ratios = strategy === 'livermore' ? [0.2, 0.2, 0.2, 0.4] : [0.4, 0.2, 0.2, 0.2];
        let isReverse = false;
        if (initLots > 0) { isReverse = true; capital = (initLots * lotSize * entry) / ratios[0]; }

        let steps = [], curP = entry, totalS = 0, totalC = 0, isLong = entry > stop;
        ratios.forEach((r, i) => {
            if(i>0) curP = isLong ? curP * 1.1 : curP * 0.9;
            let h = Math.floor((capital * r) / curP / lotSize);
            if(isReverse && i===0) h = initLots;
            if(h>0) { totalS += h*lotSize; totalC += h*lotSize*curP; }
            steps.push({ idx:i+1, trigger:curP.toFixed(2), hands:h, cost:(h*lotSize*curP).toFixed(0), avg: totalS?(totalC/totalS).toFixed(2):0 });
        });

        const risk = Math.abs(entry-stop);
        const reward = Math.abs(target-entry);
        
        currentCalcData = {
            id: Date.now(), date, stock, marketIndex: market, strategyName: strategy,
            rr: (reward/risk).toFixed(2), steps, entry, stop, target, isLong,
            checklist: [], dailyLogs: [], status: 'planning'
        };
        renderResult(currentCalcData);
    }

    function renderResult(data) {
        document.getElementById('resultCard').classList.remove('hidden');
        document.getElementById('resStockName').innerText = data.stock;
        document.getElementById('resStrategyName').innerText = data.strategyName;
        document.getElementById('resRR').innerText = data.rr;
        document.getElementById('stepTableBody').innerHTML = data.steps.map(s => `<tr><td>${s.idx}</td><td style="font-weight:bold">${s.trigger}</td><td>${s.hands}</td><td>${s.cost}</td><td>${s.avg}</td></tr>`).join('');
    }

    function addToJournal() {
        if(!currentCalcData) return;
        journalData.unshift(JSON.parse(JSON.stringify(currentCalcData)));
        saveToLocal();
        renderJournal();
    }

    function renderJournal() {
        const tbody = document.getElementById('journalBody');
        if(!journalData.length) { tbody.innerHTML = ''; document.getElementById('emptyMsg').style.display='block'; return; }
        document.getElementById('emptyMsg').style.display='none';

        tbody.innerHTML = journalData.map((item, index) => {
            const checkCount = item.checklist ? item.checklist.length : 0;
            const scoreClass = checkCount === STANDARD_CHECKLIST.length ? 'badge-red' : (checkCount >= STANDARD_CHECKLIST.length - 2 ? 'badge-green' : 'badge-gray');
            const statusBadge = item.status === 'planning' ? '📝 计划' : (item.status === 'active' ? '🔵 持仓' : '✅ 结束');
            const marketName = item.marketIndex ? item.marketIndex.split('.')[0].replace('^','') : '-';

            return `
                <tr>
                    <td><input type="date" value="${item.date}" onchange="updateJournalDate(${index}, this.value)" style="width:110px;border:none;background:transparent;cursor:pointer;"></td>
                    <td style="font-size:0.85rem; color:#666;">${marketName}</td>
                    <td style="font-weight:bold">${item.stock}</td>
                    <td onclick="toggleStatus(${index})" style="cursor:pointer; font-size:0.85rem;">${statusBadge}</td>
                    <td><button class="btn btn-secondary btn-small" onclick="viewStrategy(${index})">👁️ 详情</button></td>
                    <td style="font-size:0.8rem">损${item.stop}<br>盈${item.target}</td>
                    <td><span class="badge ${scoreClass}" onclick="openChecklist(${index})">${checkCount}/${STANDARD_CHECKLIST.length}</span></td>
                    <td><button class="btn btn-primary btn-small" onclick="openDailyLog(${index})">📈 监控</button></td>
                    <td><span style="cursor:pointer; color:#ccc; font-weight:bold;" onclick="deleteItem(${index})">×</span></td>
                </tr>
            `;
        }).join('');
    }

    // --- Modals & Logic ---
    function viewStrategy(idx) {
        const item = journalData[idx];
        document.getElementById('strategyContent').innerHTML = `
            <div style="margin-bottom:15px; font-size:0.9rem;">
                <strong>${item.stock}</strong> (${item.isLong?'做多':'做空'})<br>
                入: ${item.entry} | 损: ${item.stop} | 盈: ${item.target}
            </div>
            <table class="step-table">
                <thead><tr><th>阶段</th><th>触发价</th><th>手数</th><th>均价</th></tr></thead>
                <tbody>${item.steps.map(s=>`<tr><td>第${s.idx}笔</td><td style="font-weight:bold; color:${item.isLong?'#d32f2f':'#2e7d32'}">${s.trigger}</td><td>${s.hands}</td><td>${s.avg}</td></tr>`).join('')}</tbody>
            </table>
        `;
        document.getElementById('strategyModal').style.display='flex';
    }

    function openDailyLog(idx) {
        editingEntryId = journalData[idx].id;
        const item = journalData[idx];
        document.getElementById('logStockTitle').innerText = item.stock;
        document.getElementById('monitorStop').innerText = item.stop;
        document.getElementById('monitorTarget').innerText = item.target;
        document.getElementById('checkPriceInput').value = '';
        document.getElementById('priceAlertBox').style.display = 'none';
        
        autoTrackPrice();

        document.getElementById('logHistory').innerHTML = (item.dailyLogs||[]).map(l=>`<div class="log-entry"><div style="font-size:0.75rem;color:#999;margin-bottom:4px;">${l.date}</div><div>${l.content}</div></div>`).join('') || '<div style="text-align:center;color:#999;padding:10px;">暂无记录</div>';
        document.getElementById('dailyLogModal').style.display='flex';
    }

    function checkPriceAlert(p) {
        const price = parseFloat(p);
        const item = journalData.find(i=>i.id===editingEntryId);
        const box = document.getElementById('priceAlertBox');
        if(!price || !item) { box.style.display='none'; return; }

        box.style.display = 'block';
        const isLong = item.isLong !== false;
        
        if((isLong && price <= item.stop) || (!isLong && price >= item.stop)) {
            box.innerText = "⚠️ 警报：触及止损线！建议执行风控。"; box.className = "monitor-alert alert-stop"; return;
        }
        if((isLong && price >= item.target) || (!isLong && price <= item.target)) {
            box.innerText = "🎉 提示：触及止盈目标！建议分批止盈。"; box.className = "monitor-alert alert-win"; return;
        }
        for (let i = 1; i < item.steps.length; i++) {
            const step = item.steps[i];
            const trig = parseFloat(step.trigger);
            if ((isLong && price >= trig) || (!isLong && price <= trig)) {
                const next = item.steps[i+1];
                if (!next || (isLong && price < next.trigger) || (!isLong && price > next.trigger)) {
                    box.innerText = `🔵 信号：触及第${step.idx}笔加仓 (${trig})，建议加仓 ${step.hands} 手`;
                    box.className = "monitor-alert alert-add"; return;
                }
            }
        }
        box.style.display = 'none';
    }

    function savePriceToLog() {
        const p = document.getElementById('checkPriceInput').value;
        const alertTxt = document.getElementById('priceAlertBox').innerText;
        if(p) document.getElementById('newLogInput').value += `[现价 ${p}] ${alertTxt ? alertTxt : ''}`;
    }

    function updateJournalDate(idx, val) { journalData[idx].date = val; saveToLocal(); }
    function toggleStatus(idx) { 
        const map = { 'planning': 'active', 'active': 'closed', 'closed': 'planning' };
        journalData[idx].status = map[journalData[idx].status]; saveToLocal(); renderJournal();
    }
    function deleteItem(idx) { if(confirm("删除?")) { journalData.splice(idx,1); saveToLocal(); renderJournal(); } }
    function saveToLocal() { localStorage.setItem('aplus_journal_v27', JSON.stringify(journalData)); }
    function clearInputs() { document.getElementById('stockName').value=''; document.getElementById('resultCard').classList.add('hidden'); currentCalcData=null; }
    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(journalData));
        a.download = "trading_journal_v2.7.json";
        document.body.appendChild(a); a.click(); a.remove();
    }
    
    // --- 修复评分系统对齐 ---
    function openChecklist(idx) { 
        editingEntryId = journalData[idx].id;
        const checks = journalData[idx].checklist || [];
        document.getElementById('checklistItems').innerHTML = STANDARD_CHECKLIST.map(t => `
            <label class="check-item">
                <input type="checkbox" value="${t}" ${checks.includes(t)?'checked':''}> 
                <span>${t}</span>
            </label>
        `).join('');
        document.getElementById('checklistModal').style.display='flex';
    }
    function saveChecklist() {
        journalData.find(i=>i.id===editingEntryId).checklist = Array.from(document.querySelectorAll('#checklistItems input:checked')).map(c=>c.value);
        saveToLocal(); renderJournal(); document.getElementById('checklistModal').style.display='none';
    }
    function addLogEntry() {
        const txt = document.getElementById('newLogInput').value;
        if(!txt) return;
        const item = journalData.find(i=>i.id===editingEntryId);
        item.dailyLogs.push({ date: new Date().toLocaleString(), content: txt });
        saveToLocal(); 
        const historyDiv = document.getElementById('logHistory');
        historyDiv.innerHTML += `<div class="log-entry"><div style="font-size:0.75rem;color:#999;margin-bottom:4px;">${new Date().toLocaleString()}</div><div>${txt}</div></div>`;
        historyDiv.scrollTop = historyDiv.scrollHeight;
        document.getElementById('newLogInput').value='';
    }
    
    window.onclick = function(e) { if(e.target.classList.contains('checklist-overlay')) e.target.style.display='none'; }
</script>
</body>
